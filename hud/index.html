<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SolSpecs — Firefighter HUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="hud/fire_simulation.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; overflow:hidden; background:transparent; color:#e0e0e0; font-family:'Share Tech Mono','Courier New',Courier,monospace; }

    /* Three.js canvas — behind HUD, shown in VR + laptop */
    #xr-canvas { position:fixed; top:0; left:0; width:100%; height:100%; display:none; z-index:0; }
    #xr-canvas.active { display:block; }

    /* Landing overlay */
    #landing { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; background:radial-gradient(ellipse at 55% 38%, #091409 0%, #050908 100%); }
    #landing.hidden { display:none; }
    .landing-title { font-size:13px; letter-spacing:5px; color:rgba(0,210,155,0.80); margin-bottom:10px; }
    .landing-sub   { font-size:9px; letter-spacing:3px; color:rgba(0,210,155,0.35); margin-bottom:36px; }
    .landing-btns  { display:flex; gap:20px; margin-bottom:20px; }
    .mode-btn { font-family:inherit; font-size:12px; letter-spacing:3px; padding:14px 34px; border-radius:8px; cursor:pointer; transition:all 0.2s; }
    #btn-vr { background:rgba(120,20,0,0.88); border:1px solid rgba(255,80,0,0.70); color:#ff8040; box-shadow:0 0 18px rgba(255,60,0,0.20); }
    #btn-vr:hover { background:rgba(180,30,0,0.96); box-shadow:0 0 32px rgba(255,80,0,0.45); border-color:rgba(255,100,0,0.90); }
    #btn-ar { background:rgba(0,20,30,0.88); border:1px solid rgba(0,210,155,0.60); color:#00d29b; box-shadow:0 0 18px rgba(0,210,155,0.15); }
    #btn-ar:hover { background:rgba(0,30,20,0.96); box-shadow:0 0 30px rgba(0,210,155,0.38); border-color:rgba(0,210,155,0.90); }
    #btn-ar.hidden { display:none; }
    #btn-vr.hidden { display:none; }
    #landing-hint { font-size:9px; letter-spacing:2px; color:rgba(0,210,155,0.35); text-align:center; max-width:420px; line-height:1.8; }

    /* DOM HUD sits above Three.js canvas */
    #hud { display:none; z-index:10; }

    /* Panel base */
    .panel { position:fixed; background:rgba(0,0,0,0.80); border:1px solid rgba(0,210,155,0.30); border-radius:6px; padding:10px 14px 12px; box-shadow:0 0 20px rgba(0,210,155,0.05),inset 0 1px 0 rgba(255,255,255,0.03); }
    .panel-title { font-size:9px; letter-spacing:3px; color:rgba(0,210,155,0.65); border-bottom:1px solid rgba(0,210,155,0.14); padding-bottom:5px; margin-bottom:9px; text-transform:uppercase; }

    /* Vitals */
    #vitals { top:20px; left:20px; width:214px; overflow:hidden; }
    @keyframes flash-green  { 0%,50%,100%{border-color:rgba(0,232,122,.70);box-shadow:0 0 22px rgba(0,232,122,.30);}25%,75%{border-color:rgba(0,210,155,.30);} }
    @keyframes flash-yellow { 0%,50%,100%{border-color:rgba(255,215,0,.80);box-shadow:0 0 26px rgba(255,215,0,.35);}25%,75%{border-color:rgba(0,210,155,.30);} }
    @keyframes flash-orange { 0%,50%,100%{border-color:rgba(255,140,0,.90);box-shadow:0 0 30px rgba(255,140,0,.40);}25%,75%{border-color:rgba(0,210,155,.30);} }

    .flash-green  { animation:flash-green  1.6s 3 !important; } .flash-yellow { animation:flash-yellow 1.0s 3 !important; }
    .flash-orange { animation:flash-orange 0.8s 4 !important; } .flash-red    { animation:flash-red    0.5s 5 !important; }
    #no-signal { display:none; position:absolute; top:0;left:0;right:0; background:rgba(0,0,0,0.88); border-radius:6px 6px 0 0; text-align:center; padding:3px 6px; font-size:9px; letter-spacing:2px; color:#ff4444; }

    .vrow2 { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }

    /* Evacuation compass widget */
    #evac-compass { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.86); border:1px solid rgba(0,255,68,0.55); border-radius:50px; padding:6px 20px 7px; display:none; align-items:center; gap:10px; z-index:15; box-shadow:0 0 18px rgba(0,255,68,0.15); white-space:nowrap; }

    #conn-dot.dead { background:#ff4444; box-shadow:0 0 6px rgba(255,68,68,0.55); }

    #conn-label.live { color:#00e87a; }
    #conn-label.dead { color:#ff4444; }

    /* MAYDAY */
    #mayday-btn { position:fixed; bottom:22px; right:22px; width:78px; height:78px; border-radius:50%; background:rgba(160,0,0,0.88); border:3px solid #ff2222; color:#fff; font-family:inherit; font-size:11px; letter-spacing:2px; font-weight:bold; line-height:1.2; cursor:pointer; animation:mayday-idle 3s ease-in-out infinite; transition:background 0.12s, box-shadow 0.12s; }
    #mayday-btn:hover, #mayday-btn:active { background:rgba(255,0,0,0.96); box-shadow:0 0 44px rgba(255,0,0,0.70); }
    @keyframes mayday-idle   { 0%,100%{box-shadow:0 0 18px rgba(255,0,0,0.40);}50%{box-shadow:0 0 32px rgba(255,0,0,0.65);} }
    #mayday-btn.activated { background:rgba(255,0,0,0.96); animation:mayday-active 0.45s ease-in-out infinite; }
    @keyframes mayday-active { 0%,100%{box-shadow:0 0 55px rgba(255,0,0,0.90);}50%{box-shadow:0 0 16px rgba(255,0,0,0.30);} }

<canvas id="xr-canvas"></canvas>

<!-- ═══════════════════════════════════════════════════════
     FIRE SIMULATION ENGINE (loaded from fire_simulation.js)
════════════════════════════════════════════════════════ -->


<!-- ═══════════════════════════════════════════════════════
     HUD APPLICATION
════════════════════════════════════════════════════════ -->
<script>
'use strict';

// Polyfill roundRect for browsers that don't support it yet
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        r = Math.min(r, w/2, h/2);
        this.moveTo(x+r, y);
        this.lineTo(x+w-r, y); this.arcTo(x+w, y, x+w, y+r, r);
        this.lineTo(x+w, y+h-r); this.arcTo(x+w, y+h, x+w-r, y+h, r);
        this.lineTo(x+r, y+h); this.arcTo(x, y+h, x, y+h-r, r);
        this.lineTo(x, y+r); this.arcTo(x, y, x+r, y, r);
        this.closePath();
        return this;
    };
}

/* ── CONFIG ─────────────────────────────────────────── */
const SENSOR_SERVER      = 'https://localhost:8443';
const PANORAMA_URL       = 'hud/textures/panorama.jpg';
const SATELLITE_MAP_URL  = 'hud/textures/satellite.jpg';
const SENSOR_POLL_MS  = 2000;
const FIRE_TICK_MS         = 60000;  // 1 tick per real minute = 1 simulated minute
const FIRE_REALTIME_RATIO  = 60000;  // ms per simulated minute
const DEMO_WIND_DIR   = 45;
const DEMO_WIND_SPEED = 15;
const DEMO_SEED       = 42;
const GRID_SIZE       = 64;
const CELL_PX         = 5;

/* ── DEMO BOOT ──────────────────────────────────────── */
const grid = new FireGrid(GRID_SIZE);
grid.generateTerrain(DEMO_SEED);
grid.setFire(1,62); grid.setFire(2,61); grid.setFire(3,62);
for(let i=0;i<20;i++) grid.tick(DEMO_WIND_DIR, DEMO_WIND_SPEED);
const FIGHTER_X = grid.clearingX;
const FIGHTER_Y = grid.clearingY;

/* ── STATE ──────────────────────────────────────────── */
let simTick=20, lastTier=null, scrubActive=false, scrubTimer=null;
let proxAlertTick=-99, maydayFired=false;
const SCENE_START = Date.now();
let thermalOffset=0, airSec=1800, lastPollAt=0;
const alertQ=[]; let alertId=null;
let currentSensorData = null;   // latest sensor payload — read by VR panels
let currentAlertText  = '';     // current active alert (for VR panel)
let currentAlertLevel = '';
let activeMode = null;          // 'vr' | 'ar' | 'laptop'
let evacRoute    = null;        // current evac path [{x,y}…], null if blocked
let lastEvacDir  = null;        // last announced cardinal direction
let prevRoutePts = 0;           // waypoint count, used to detect major reroutes
let audioCtx   = null;
let ambientStarted = false;

/* ── SPEECH MANAGER (disabled) ───────────────────────── */
const speechMgr = { speak(){} };

/* ── AUDIO HELPERS ───────────────────────────────────── */
function _getAudioCtx() {
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    return audioCtx;
}

// Two-tone alarm: 800/600 Hz alternating, 200ms each, 3 reps
// Returns Promise that resolves when alarm finishes (~1.2s)
function playAlarm() {
    return new Promise(resolve=>{
        const ctx=_getAudioCtx();
        const tones=[800,600];
        let t=ctx.currentTime;
        for(let rep=0;rep<3;rep++) tones.forEach(freq=>{
            const osc=ctx.createOscillator(), g=ctx.createGain();
            osc.frequency.value=freq; osc.type='square';
            g.gain.setValueAtTime(0.28,t);
            g.gain.exponentialRampToValueAtTime(0.001,t+0.185);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(t); osc.stop(t+0.2); t+=0.2;
        });
        setTimeout(resolve, Math.round((t-ctx.currentTime)*1000)+50);
    });
}

// Layered filtered white noise: deep rumble + high crackle
function startAmbientAudio() {
    if(ambientStarted) return; ambientStarted=true;
    const ctx=_getAudioCtx();
    const bufLen=ctx.sampleRate*2;
    const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) data[i]=Math.random()*2-1;

    // Rumble layer
    const rumbleSrc=ctx.createBufferSource(); rumbleSrc.buffer=buf; rumbleSrc.loop=true;
    const rumbleFilt=ctx.createBiquadFilter(); rumbleFilt.type='lowpass'; rumbleFilt.frequency.value=180;
    const rumbleGain=ctx.createGain(); rumbleGain.gain.value=0.045;
    rumbleSrc.connect(rumbleFilt); rumbleFilt.connect(rumbleGain); rumbleGain.connect(ctx.destination);
    rumbleSrc.start();

    // Crackle layer
    const crackleSrc=ctx.createBufferSource(); crackleSrc.buffer=buf; crackleSrc.loop=true; crackleSrc.playbackRate.value=1.4;
    const crackleFilt=ctx.createBiquadFilter(); crackleFilt.type='bandpass'; crackleFilt.frequency.value=1600; crackleFilt.Q.value=0.6;
    const crackleGain=ctx.createGain(); crackleGain.gain.value=0.018;
    crackleSrc.connect(crackleFilt); crackleFilt.connect(crackleGain); crackleGain.connect(ctx.destination);
    crackleSrc.start();
}

/* ── UTILS ──────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const fmt = s => { s=Math.max(0,Math.floor(s)); return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; };
const hrCol  = v => v>=140?'#ff3333':v>=120?'#ff8c00':v>=90?'#ffd700':'#00e87a';
const o2Col  = v => v<90?'#ff3333':v<93?'#ff8c00':v<95?'#ffd700':'#00e87a';
const tmpCol = v => v>=38.5?'#ff3333':v>=37.5?'#ff8c00':v>=37?'#ffd700':'#00e87a';
const wgtCol = v => v>=32?'#ff3333':v>=28?'#ff8c00':v>=26?'#ffd700':'#00e87a';
const hydCol = v => v==='critical'?'#ff3333':v==='low'?'#ffd700':'#00e87a';
const TIER_COLOR = {green:'#00e87a',yellow:'#ffd700',orange:'#ff8c00',red:'#ff3333'};

/* ── VITALS UPDATE (DOM) ─────────────────────────────── */
function updateVitals(d) {
    currentSensorData = d;
    const hr=d.heart_rate, spo2=d.spo2, tmp=d.skin_temp_c, wbgt=d.wbgt, hyd=d.hydration, tier=d.heat_tier;
    $('v-hr').textContent=hr>0?hr:'--'; $('v-hr').style.color=hr>0?hrCol(hr):'#888';

    $('v-temp').textContent=tmp.toFixed(1); $('v-temp').style.color=tmpCol(tmp);

    if(tier!==lastTier){ if(lastTier!==null){ flashVitals(tier); showTierAlert(tier); } lastTier=tier; }
    if(d.thermal_exposure_s!=null){ thermalOffset=d.thermal_exposure_s; lastPollAt=Date.now(); }
    if(d.fall_detected){

/* ── ALERT QUEUE ─────────────────────────────────────── */
function showAlert(text, level='warning') { alertQ.push({text,level}); if(!alertId) _drainAlerts(); }

function _drainAlerts() {
    if(alertQ.length===0){ alertId=null; currentAlertText=''; currentAlertLevel=''; return; }
    const {text,level}=alertQ.shift();
    currentAlertText=text; currentAlertLevel=level;
    const b=$('alert-banner');

/* ── FIRE PROXIMITY ──────────────────────────────────── */
function checkProximity(cells) {
    let minDist=Infinity;
    for(let y=0;y<GRID_SIZE;y++) for(let x=0;x<GRID_SIZE;x++) if(cells[y][x].state===1){ const d=Math.hypot(x-FIGHTER_X,y-FIGHTER_Y); if(d<minDist)minDist=d; }
    if(minDist>5) return;
    if(simTick-proxAlertTick<24) return;
    proxAlertTick=simTick;

    if(minDist<=1){
        showAlert('FIRE AT YOUR POSITION — EVACUATE IMMEDIATELY','critical');
        playAlarm();
    } else if(minDist<=2){
        showAlert('IMMEDIATE EVACUATION — FOLLOW GREEN ROUTE','critical');
        playAlarm();
    } else if(minDist<=3){
        const e=Math.max(1,Math.round(minDist/0.6));
        showAlert(`FIRE APPROACHING — EST. ${e} MIN`,'critical');
        playAlarm();
    } else {
        const mins=Math.max(1,Math.round(minDist*2));
        showAlert('FIRE APPROACHING — CONSIDER EVACUATION ROUTE','warning');
    }
}

/* ── FIRE CANVAS RENDER (DOM + source for VR texture) ── */
const fcanvas=$('fire-canvas'), fctx=fcanvas.getContext('2d');
const _satImg=new Image(); let _satLoaded=false;
_satImg.onload=()=>{_satLoaded=true; renderFire(grid.getState());};
_satImg.onerror=()=>{_satLoaded=false;};
_satImg.src=SATELLITE_MAP_URL;
const FUEL_RGB=[[26,68,136],[200,180,86],[74,110,42],[29,77,26],[119,119,119],[153,153,153]];

function renderFire(cells, isPrediction=false) {
    const W=GRID_SIZE*CELL_PX;

    if(_satLoaded) {
        // Satellite base layer — drawn first
        fctx.drawImage(_satImg, 0, 0, W, W);

        // Fire overlay with fillRect — leaves satellite visible for unburned cells
        const burnCol  = isPrediction ? 'rgba(255,50,0,0.38)'  : 'rgba(255,100,0,0.70)';
        const burnedCol= 'rgba(10,10,10,0.55)';
        for(let cy=0;cy<GRID_SIZE;cy++) for(let cx=0;cx<GRID_SIZE;cx++){
            const s=cells[cy][cx].state;
            if(s===0) continue;
            fctx.fillStyle = s===1 ? burnCol : burnedCol;
            fctx.fillRect(cx*CELL_PX, cy*CELL_PX, CELL_PX, CELL_PX);
        }

        // Grid lines every 8 cells
        fctx.save(); fctx.strokeStyle='rgba(255,255,255,0.10)'; fctx.lineWidth=0.5;
        for(let i=8;i<GRID_SIZE;i+=8){
            const px=i*CELL_PX;
            fctx.beginPath(); fctx.moveTo(px,0); fctx.lineTo(px,W); fctx.stroke();
            fctx.beginPath(); fctx.moveTo(0,px); fctx.lineTo(W,px); fctx.stroke();
        }
        fctx.restore();
    } else {
        // Fallback: solid-color grid rendering
        const img=fctx.createImageData(W,W), d=img.data;
        for(let cy=0;cy<GRID_SIZE;cy++) for(let cx=0;cx<GRID_SIZE;cx++){
            const cell=cells[cy][cx]; let r,g,b;
            if(cell.state===1){r=255;g=80;b=0;}
            else if(cell.state===2){r=42;g=14;b=6;}
            else{const base=FUEL_RGB[cell.fuel_type]??FUEL_RGB[5];const ef=Math.max(0.55,Math.min(1.10,0.60+0.50*(cell.elevation/85)));r=Math.min(255,Math.round(base[0]*ef));g=Math.min(255,Math.round(base[1]*ef));b=Math.min(255,Math.round(base[2]*ef));}
            for(let py=0;py<CELL_PX;py++){const rb=((cy*CELL_PX+py)*W+cx*CELL_PX)*4;for(let px=0;px<CELL_PX;px++){const i=rb+px*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=255;}}
        }
        fctx.putImageData(img,0,0);
    }

    // Evacuation route overlay
    if(evacRoute&&evacRoute.length>=2){
        const half=CELL_PX/2;
        fctx.save();
        fctx.strokeStyle='#00ff44'; fctx.lineWidth=2.5; fctx.setLineDash([5,3]);
        fctx.shadowColor='#00ff44'; fctx.shadowBlur=6;
        fctx.beginPath();
        evacRoute.forEach((p,i)=>{
            const px=p.x*CELL_PX+half, py=p.y*CELL_PX+half;
            i===0?fctx.moveTo(px,py):fctx.lineTo(px,py);
        });
        fctx.stroke();
        // Arrowhead at final waypoint
        const n=evacRoute.length-1;
        const ex=evacRoute[n].x*CELL_PX+half, ey=evacRoute[n].y*CELL_PX+half;
        const px2=evacRoute[Math.max(0,n-1)].x*CELL_PX+half, py2=evacRoute[Math.max(0,n-1)].y*CELL_PX+half;
        const ha=Math.atan2(ey-py2,ex-px2);
        fctx.setLineDash([]); fctx.fillStyle='#00ff44';
        fctx.beginPath(); fctx.moveTo(ex,ey);
        fctx.lineTo(ex-9*Math.cos(ha-0.4),ey-9*Math.sin(ha-0.4));
        fctx.lineTo(ex-9*Math.cos(ha+0.4),ey-9*Math.sin(ha+0.4));
        fctx.closePath(); fctx.fill();
        fctx.restore();
    }

    const fx=FIGHTER_X*CELL_PX+CELL_PX/2, fy=FIGHTER_Y*CELL_PX+CELL_PX/2;
    fctx.beginPath(); fctx.arc(fx,fy,6,0,Math.PI*2); fctx.fillStyle='#0088ff'; fctx.fill();
    fctx.strokeStyle='#ffffff'; fctx.lineWidth=2; fctx.stroke();

    // Teammate dots FF-1..FF-4
    const GS=GRID_SIZE*CELL_PX;
    [[0.30,0.28],[0.68,0.22],[0.22,0.70],[0.72,0.65]].forEach(([tx2,ty2],i)=>{
        const tmx=tx2*GS, tmy=ty2*GS;
        fctx.beginPath(); fctx.arc(tmx,tmy,5,0,Math.PI*2); fctx.fillStyle='#00cc44'; fctx.fill();
        fctx.strokeStyle='#ffffff'; fctx.lineWidth=1.5; fctx.stroke();
        fctx.font='bold 7px Courier New'; fctx.fillStyle='#ffffff'; fctx.textAlign='center';
        fctx.fillText('FF-'+(i+1),tmx,tmy-8); fctx.textAlign='left';
    });

    // Wind arrow
    const rad=DEMO_WIND_DIR*Math.PI/180, vx=Math.sin(rad), vy=-Math.cos(rad);
    const W2=GRID_SIZE*CELL_PX, ox=W2-16, oy=16, len=16, wtx=ox+vx*len, wty=oy+vy*len, ang=Math.atan2(vy,vx);
    fctx.save(); fctx.strokeStyle='#ffdd00'; fctx.fillStyle='#ffdd00'; fctx.lineWidth=2;
    fctx.beginPath(); fctx.moveTo(ox,oy); fctx.lineTo(wtx,wty); fctx.stroke();
    fctx.beginPath(); fctx.moveTo(wtx,wty); fctx.lineTo(wtx-7*Math.cos(ang-0.4),wty-7*Math.sin(ang-0.4)); fctx.lineTo(wtx-7*Math.cos(ang+0.4),wty-7*Math.sin(ang+0.4)); fctx.closePath(); fctx.fill();
    fctx.font='bold 8px Courier New'; fctx.fillStyle='#ffdd00'; fctx.textAlign='center'; fctx.fillText('WIND',ox,oy+11); fctx.textAlign='left'; fctx.restore();

    // Legend
    fctx.save();
    const lx=4, ly=GS-36;
    [['#0088ff','YOU'],['#00cc44','TEAM'],['#ff5000','FIRE']].forEach(([col,txt],i)=>{
        const liy=ly+i*12;
        fctx.beginPath(); fctx.arc(lx+4,liy,3,0,Math.PI*2); fctx.fillStyle=col; fctx.fill();
        fctx.font='7px Courier New'; fctx.fillStyle='rgba(255,255,255,0.70)'; fctx.fillText(txt,lx+11,liy+3);
    });
    fctx.restore();
}

function updateTimers() {

async function pollSensors() {

async function pollEMGEvents() {
    try {
        const res=await fetch(`${SENSOR_SERVER}/emg-events`,{signal:AbortSignal.timeout(2000)});
        if(!res.ok) return;
        const data=await res.json();
        (data.events||[]).forEach(ev=>{

            else if(ev.gesture==='half_clench') triggerMayday();

}

function fireTick() {
    grid.tick(DEMO_WIND_DIR,DEMO_WIND_SPEED); simTick++;

    if(scrubActive){
        const offset=parseInt(scrubber.value)||0;

}

function makeFallbackTex() {
    const c=document.createElement('canvas'); c.width=2048; c.height=1024;
    const ctx=c.getContext('2d');
    const g=ctx.createLinearGradient(0,0,0,1024);
    g.addColorStop(0,'#87CEEB');
    g.addColorStop(0.45,'#B8D4E8');
    g.addColorStop(0.65,'#D4A96A');
    g.addColorStop(0.80,'#C4955A');
    g.addColorStop(0.90,'#8B7355');
    g.addColorStop(1.00,'#6B8B4A');
    ctx.fillStyle=g; ctx.fillRect(0,0,2048,1024);
    ctx.fillStyle='rgba(80,70,55,0.55)';
    for(let x=0;x<2048;x+=3){
        const h=80+Math.sin(x*0.018)*30+Math.sin(x*0.055)*14;
        ctx.fillRect(x,1024-Math.round(h*1.3)-80,3,Math.round(h*1.3));
    }
    return new THREE.CanvasTexture(c);
}

/* Vegetation billboards */
function _vegFallback(type) {
    const lrng=_mulberry32(type==='tree'?11:type==='shrub'?22:33);
    const isDead=type==='dead'; const isTree=type==='tree';
    const c=document.createElement('canvas');
    c.width=isTree?128:96; c.height=isTree?256:128;
    const ctx=c.getContext('2d');
    const hue=isDead?28+lrng()*15:100+lrng()*35;
    const sat=isDead?35+lrng()*20:45+lrng()*25;
    const lig=isDead?28+lrng()*12:22+lrng()*12;
    ctx.fillStyle=`hsl(${hue},${sat}%,${lig}%)`;
    const W=c.width,H=c.height;
    ctx.beginPath();
    for(let a=0;a<Math.PI*2;a+=0.25){
        const wobble=0.65+lrng()*0.50;
        const rx=(isTree?W*0.30:W*0.42)*wobble;
        const ry=(isTree?H*0.42:H*0.40)*wobble;
        const px=W/2+Math.cos(a)*rx;
        const py=H*(isTree?0.45:0.50)+Math.sin(a)*ry;
        a<0.01?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill();
    return new THREE.CanvasTexture(c);
}
function _loadVegTex(path,type){
    return new Promise(resolve=>{
        new THREE.TextureLoader().load(path,tex=>{tex.premultiplyAlpha=true;resolve(tex);},undefined,()=>resolve(_vegFallback(type)));
    });
}
async function buildVegetation(){
    const rng=_mulberry32(99);
    const [tree1,tree2,tree3,shrub1,shrub2,shrub3,dead1,dead2]=await Promise.all([
        _loadVegTex('hud/textures/tree1.png','tree'),
        _loadVegTex('hud/textures/tree2.png','tree'),
        _loadVegTex('hud/textures/tree3.png','tree'),
        _loadVegTex('hud/textures/shrub1.png','shrub'),
        _loadVegTex('hud/textures/shrub2.png','shrub'),
        _loadVegTex('hud/textures/shrub3.png','shrub'),
        _loadVegTex('hud/textures/dead_brush1.png','dead'),
        _loadVegTex('hud/textures/dead_brush2.png','dead'),
    ]);
    const treeTex=[tree1,tree2,tree3],shrubTex=[shrub1,shrub2,shrub3],deadTex=[dead1,dead2];
    const mkS=tex=>new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
    for(let i=0;i<35;i++){
        const angle=rng()*Math.PI*2,r=5+rng()*20,h=3+rng()*3;
        const s=mkS(treeTex[Math.floor(rng()*3)]);
        s.position.set(Math.cos(angle)*r,h*0.5,Math.sin(angle)*r);
        s.scale.set(h*0.55,h,1); scene3.add(s);
    }
    for(let i=0;i<55;i++){
        const angle=rng()*Math.PI*2,r=2+rng()*13;
        const isDead=rng()<0.40;
        const tex=isDead?deadTex[Math.floor(rng()*2)]:shrubTex[Math.floor(rng()*3)];
        const h=0.5+rng();
        const s=mkS(tex);
        s.position.set(Math.cos(angle)*r,h*0.5,Math.sin(angle)*r);
        s.scale.set(h*1.2,h,1); scene3.add(s);
    }
    for(let i=0;i<12;i++){
        const angle=rng()*Math.PI*2,r=1+rng()*4,h=0.25+rng()*0.35;
        const s=mkS(deadTex[Math.floor(rng()*2)]);
        s.position.set(Math.cos(angle)*r,h*0.5,Math.sin(angle)*r);
        s.scale.set(h*2.5,h,1); scene3.add(s);
    }
}
function buildGroundPlane(){
    const geo=new THREE.PlaneGeometry(200,200);
    const lrng=_mulberry32(77);
    const c=document.createElement('canvas'); c.width=c.height=512;
    const ctx=c.getContext('2d');

    }

    fallbackTex.wrapS=fallbackTex.wrapT=THREE.RepeatWrapping;

function threeAnimate() {

function _hapticPulse(source, intensity, durationMs) {
    source?.gamepad?.hapticActuators?.[0]?.pulse(intensity, durationMs);
}

function _hapticDouble(source) {
    _hapticPulse(source, 0.5, 100);
    setTimeout(()=>_hapticPulse(source, 0.5, 100), 220);
}

function _playScanTone() {
    const ctx=_getAudioCtx();
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(400, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(800, ctx.currentTime+0.5);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime+0.48);
    osc.start(); osc.stop(ctx.currentTime+0.5);
}

function _cycleFireScrub() {
    _scrubStep=(_scrubStep+1)%4;
    const mins=[0,10,20,30][_scrubStep];
    if(mins===0){ scrubActive=false; renderFire(grid.getState()); }
    else { scrubActive=true; renderFire(grid.predictFuture(mins,DEMO_WIND_DIR,DEMO_WIND_SPEED),true); }
    if(vrFireTex) vrFireTex.needsUpdate=true;
}

function _speakStatus() { /* voice disabled */ }

function _renderToJpeg(w, h, beforeRender, afterRender) {
    // Renders the scene into a WebGLRenderTarget using renderer3 (same GL context
    // as all loaded textures) then reads pixels back via CPU and converts to JPEG.
    const rt = new THREE.WebGLRenderTarget(w, h);
    if (beforeRender) beforeRender();
    const savedAspect = camera3.aspect;
    camera3.aspect = w / h;
    camera3.updateProjectionMatrix();
    renderer3.setRenderTarget(rt);
    renderer3.render(scene3, camera3);
    renderer3.setRenderTarget(null);
    camera3.aspect = savedAspect;
    camera3.updateProjectionMatrix();
    if (afterRender) afterRender();

    // Read RGBA — WebGL origin is bottom-left, flip Y
    const buf = new Uint8Array(w * h * 4);
    renderer3.readRenderTargetPixels(rt, 0, 0, w, h, buf);
    rt.dispose();

    const oc = document.createElement('canvas');
    oc.width = w; oc.height = h;
    const ctx2 = oc.getContext('2d');
    const id = ctx2.createImageData(w, h);
    for (let y = 0; y < h; y++) {
        const s = (h - 1 - y) * w * 4;
        id.data.set(buf.subarray(s, s + w * 4), y * w * 4);
    }
    ctx2.putImageData(id, 0, 0);

    return new Promise((res, rej) => {
        oc.toBlob(b => {
            if (!b) { rej(new Error('scene capture returned null blob')); return; }
            b.arrayBuffer().then(res).catch(rej);
        }, 'image/jpeg', 0.85);
    });
}

async function _captureVRScene() {
    return _renderToJpeg(768, 512,
        ()=>{ if(vrHudGroup) vrHudGroup.visible=false; },
        ()=>{ if(vrHudGroup) vrHudGroup.visible=true;  }
    );
}

function _pollControllers() {
    if(activeMode!=='vr') return;
    const session=renderer3?.xr?.getSession?.();
    if(!session) return;

    const flashNow=Date.now()<_triggerFlashUntil;
    _controllerLines.forEach(({line})=>{
        line.material.color.set(flashNow?0x00ffff:0xffffff);
        line.material.opacity=flashNow?0.80:0.35;
    });

    for(const src of session.inputSources){
        const gp=src.gamepad; if(!gp) continue;
        if(src.handedness==='right'){
            const trig=gp.buttons[0]?.pressed||false;
            const aBut=gp.buttons[4]?.pressed||false;
            const bBut=gp.buttons[5]?.pressed||false;
            if(trig&&!_prevBtns.rTrig){
                _triggerFlashUntil=Date.now()+200;
                _hapticPulse(src,0.3,100);
                _lastScanSource=src;
                scanFuel();
            }
            if(aBut&&!_prevBtns.rA) _cycleFireScrub();
            if(bBut&&!_prevBtns.rB){ _hapticPulse(src,1.0,500); triggerMayday(); }
            _prevBtns.rTrig=trig; _prevBtns.rA=aBut; _prevBtns.rB=bBut;
        }
        if(src.handedness==='left'){
            const yBut=gp.buttons[5]?.pressed||false;
            if(yBut&&!_prevBtns.lY) _speakStatus();
            _prevBtns.lY=yBut;
        }
    }
}

function _makeGlowTex(priority) {
    const col=FUEL_TIER_COL[_fuelTier(priority)].rgb;
    const c=document.createElement('canvas'); c.width=c.height=128;
    const ctx=c.getContext('2d');
    const g=ctx.createRadialGradient(64,64,0,64,64,64);
    g.addColorStop(0,   `rgba(${col},1.0)`);
    g.addColorStop(0.30,`rgba(${col},0.70)`);
    g.addColorStop(0.65,`rgba(${col},0.18)`);
    g.addColorStop(1,   `rgba(${col},0)`);
    ctx.fillStyle=g; ctx.fillRect(0,0,128,128);
    return new THREE.CanvasTexture(c);
}

function _makeLabelTex(item) {
    const col=FUEL_TIER_COL[_fuelTier(item.priority)].hex;
    const c=document.createElement('canvas'); c.width=400; c.height=84;
    const ctx=c.getContext('2d');
    ctx.fillStyle='rgba(0,0,0,0.80)';
    ctx.beginPath(); ctx.roundRect(2,2,396,80,8); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(2,2,396,80,8); ctx.stroke();
    ctx.textAlign='center';
    ctx.font='bold 18px "Courier New"'; ctx.fillStyle='#ffffff';
    ctx.fillText(item.fuel_type.replace(/_/g,' ').toUpperCase(),200,26);
    ctx.font='13px "Courier New"'; ctx.fillStyle=col;
    ctx.fillText((item.position||'ahead')+' · '+(item.action||'').substring(0,28),200,52);
    ctx.font='11px "Courier New"'; ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.fillText('PRIORITY '+item.priority+' · '+item.flammability,200,74);
    ctx.textAlign='left';
    return new THREE.CanvasTexture(c);
}

function boxToWorldPosition(box, cam, distance=4.0) {
    const cx=((box[1]+box[3])/2/1000)*2-1;
    const cy=-(((box[0]+box[2])/2/1000)*2-1);
    const v=new THREE.Vector3(cx,cy,-1).unproject(cam);
    v.sub(cam.position).normalize();
    return cam.position.clone().add(v.multiplyScalar(distance));
}

function _createMarker(item, worldPos) {
    const group=new THREE.Group(); group.position.copy(worldPos);
    const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:_makeGlowTex(item.priority),transparent:true,depthWrite:false}));
    glow.scale.setScalar(0.46); glow.userData.pulse=true; group.add(glow);
    const label=new THREE.Sprite(new THREE.SpriteMaterial({map:_makeLabelTex(item),transparent:true,depthWrite:false}));
    label.scale.set(0.92,0.19,1); label.position.set(0,0.40,0); group.add(label);
    scene3.add(group); return group;
}

function _clearMarkers(cb) {
    const old=[...fuelMarkers]; fuelMarkers=[];
    if(!old.length){cb&&cb();return;}
    let op=1.0;
    const id=setInterval(()=>{
        op-=0.14;
        old.forEach(g=>g.children.forEach(s=>{if(s.material)s.material.opacity=Math.max(0,op);}));
        if(op<=0){old.forEach(g=>scene3.remove(g));clearInterval(id);cb&&cb();}
    },20);
}

function _fadeInMarkers(markers) {
    let op=0;
    const id=setInterval(()=>{
        op+=0.08;
        markers.forEach(g=>g.children.forEach(s=>{if(s.material)s.material.opacity=Math.min(1,op);}));
        if(op>=1)clearInterval(id);
    },20);
}

function _placeVRMarkers(data) {
    const fresh=data.map((item,i)=>{
        const angle=(i/data.length)*Math.PI*2+Math.random()*0.5;
        const r=3+Math.random()*4;
        const pos=new THREE.Vector3(
            camera3.position.x+Math.cos(angle)*r,
            camera3.position.y-1.35+Math.random()*0.3,
            camera3.position.z+Math.sin(angle)*r
        );
        const m=_createMarker(item,pos);
        m.children.forEach(s=>{if(s.material)s.material.opacity=0;});
        return m;
    });
    fuelMarkers=fresh; _fadeInMarkers(fresh);
}

function _showFuelPanel(data) {

    $('fuel-list').innerHTML=data.slice(0,5).map((item,i)=>`
<div class="fuel-item">

}

function _speakTopFuel(_data) { /* voice disabled */ }

async function scanFuel() {
    if(isScanning||!scene3)return;
    isScanning=true; setScanStatus('SCANNING...');

    try {
        _playScanTone();
        showAlert('SCANNING FUEL...','info');
        const body = activeMode==='vr' ? await _captureVRScene() : await _captureLaptopScene();
        console.log('[scanFuel] captured image bytes:', body ? body.byteLength : 0);
        const res=await fetch(`${SENSOR_SERVER}/analyze-fuel`,{
            method:'POST',
            headers:{'Content-Type':'image/jpeg'},
            body,
            signal:AbortSignal.timeout(60000),
        });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw=await res.json();
        console.log('[scanFuel] server response:', JSON.stringify(raw).slice(0,300));
        // Backend error responses
        if(raw && raw.error){
            if(raw.error==='no_key')
                throw new Error('GEMINI_API_KEY not set on server — run: export GEMINI_API_KEY=your_key');
            if(raw.error==='no_image')
                throw new Error('Scene capture returned empty image — try again');
            throw new Error('Gemini error: ' + raw.error);
        }
        const data=Array.isArray(raw)?raw:[];

        _clearMarkers(()=>{
            try {
                console.log('[scanFuel] callback: data.length=', data.length, 'activeMode=', activeMode, 'scene3=', !!scene3, 'camera3=', !!camera3);
                if(!data.length){
                    showAlert('NO FUELS DETECTED','info');
                    setScanStatus('NO FUELS DETECTED');
                    setTimeout(()=>{setScanStatus('');isScanning=false;},3000);
                    return;
                }
                const top5=data.slice(0,5);
                const fresh=top5.map((item,i)=>{
                    const pos = boxToWorldPosition(item.box_2d, camera3);
                    console.log('[scanFuel] marker', i, item.fuel_type, 'pos:', pos.x.toFixed(2), pos.y.toFixed(2), pos.z.toFixed(2));
                    const m=_createMarker(item,pos);
                    m.children.forEach(s=>{if(s.material)s.material.opacity=0;});
                    return m;
                });
                console.log('[scanFuel] created', fresh.length, 'markers, adding to scene');
                fuelMarkers=fresh; _fadeInMarkers(fresh);
                _showFuelPanel(top5); _speakTopFuel(top5);
                if(activeMode==='vr') _placeVRMarkers(top5);
                _hapticDouble(_lastScanSource);
                setScanStatus(''); isScanning=false;
            } catch(cbErr) {
                console.error('[scanFuel] marker callback error:', cbErr);
                showAlert('SCAN FAILED — marker error: ' + cbErr.message, 'critical');
                setScanStatus('SCAN FAILED');
                setTimeout(()=>{setScanStatus('');isScanning=false;},4000);
            }
        });
    } catch(e){
        console.error('Fuel scan failed:', e);
        showAlert('SCAN FAILED — ' + (e.message||'unknown error'), 'critical');
        setScanStatus('SCAN FAILED');
        setTimeout(()=>{setScanStatus('');isScanning=false;},4000);
    }
}

async function enterVR() {
    if(!navigator.xr){ enterLaptop(); return; }
    const ok=await navigator.xr.isSessionSupported('immersive-vr').catch(()=>false);
    if(!ok){ enterLaptop(); return; }
    try {
        const session=await navigator.xr.requestSession('immersive-vr',{
            optionalFeatures:['local-floor','bounded-floor'],
        });
        if(!renderer3) initThreeScene();
        initVRHUD();
        renderer3.xr.setSession(session);

        // Controller ray lines — one per hand
        _controllerLines=[];
        for(let i=0;i<2;i++){
            const ctrl=renderer3.xr.getController(i);
            const geo=new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-5)
            ]);
            const line=new THREE.Line(geo, new THREE.LineBasicMaterial({
                color:0xffffff, transparent:true, opacity:0.35, depthTest:false
            }));
            ctrl.add(line);
            scene3.add(ctrl);
            _controllerLines.push({ctrl,line});
        }

        // Track which source is which hand
        session.addEventListener('inputsourceschange', ev=>{
            for(const src of ev.added){
                if(src.handedness==='right') _prevBtns.rTrig=_prevBtns.rA=_prevBtns.rB=false;
                if(src.handedness==='left')  _prevBtns.lY=false;
            }
        });

        renderer3.setAnimationLoop(threeAnimate);
        $('xr-canvas').classList.add('active');
        $('landing').classList.add('hidden');
        $('hud').style.display='none';
        activeMode='vr';
        startAmbientAudio();
        session.addEventListener('end',()=>{
            renderer3.setAnimationLoop(null);
            if(vrHudGroup){ camera3.remove(vrHudGroup); vrHudGroup=null; vrFireTex=null; }
            _controllerLines.forEach(({ctrl})=>scene3.remove(ctrl));
            _controllerLines=[];
            $('xr-canvas').classList.remove('active');
            $('landing').classList.remove('hidden');
            $('hud').style.display='none';
            activeMode=null;
        });
    } catch(e){ console.warn('VR failed:',e.message); enterLaptop(); }
}

async function enterAR() {
    if(!navigator.xr){ enterLaptop(); return; }
    const ok=await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
    if(!ok){ enterLaptop(); return; }
    try {
        const session=await navigator.xr.requestSession('immersive-ar',{
            requiredFeatures:['camera-access'],
            optionalFeatures:['dom-overlay'],
            domOverlay:{root:document.getElementById('hud')},
        });
        const glCanvas=document.createElement('canvas');
        document.body.appendChild(glCanvas);
        const gl=glCanvas.getContext('webgl',{xrCompatible:true});
        await gl.makeXRCompatible();
        session.updateRenderState({baseLayer:new XRWebGLLayer(session,gl)});
        document.body.style.background='transparent';
        $('landing').classList.add('hidden');
        $('hud').style.display='block';
        activeMode='ar';
        (function xrFrame(){ session.requestAnimationFrame(xrFrame); })();
        session.addEventListener('end',()=>{
            glCanvas.remove(); document.body.style.background='';
            $('landing').classList.remove('hidden'); $('hud').style.display='none';
            activeMode=null;
        });
    } catch(e){ console.warn('AR failed:',e.message); enterLaptop(); }
}

function enterLaptop() {
    if(!renderer3) initThreeScene();
    // First-person panorama look-around via mouse drag
    let isDragging=false, prevX=0, prevY=0, yaw=0, pitch=0;
    const cvs=$('xr-canvas');
    cvs.addEventListener('mousedown',e=>{ isDragging=true; prevX=e.clientX; prevY=e.clientY; });
    cvs.addEventListener('mousemove',e=>{
        if(!isDragging)return;
        yaw  -=(e.clientX-prevX)*0.25; pitch-=(e.clientY-prevY)*0.25;
        pitch=Math.max(-80,Math.min(80,pitch));
        camera3.rotation.set(pitch*Math.PI/180,yaw*Math.PI/180,0,'YXZ');
        prevX=e.clientX; prevY=e.clientY;
    });
    cvs.addEventListener('mouseup',  ()=>isDragging=false);
    cvs.addEventListener('mouseleave',()=>isDragging=false);
    // Touch support
    cvs.addEventListener('touchstart',e=>{ isDragging=true; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; },{passive:true});
    cvs.addEventListener('touchmove', e=>{ if(!isDragging)return; const t=e.touches[0]; yaw-=(t.clientX-prevX)*0.25; pitch-=(t.clientY-prevY)*0.25; pitch=Math.max(-80,Math.min(80,pitch)); camera3.rotation.set(pitch*Math.PI/180,yaw*Math.PI/180,0,'YXZ'); prevX=t.clientX; prevY=t.clientY; },{passive:true});
    cvs.addEventListener('touchend',  ()=>isDragging=false);

    renderer3.setAnimationLoop(()=>{ renderer3.render(scene3,camera3); });
    $('xr-canvas').classList.add('active');
    $('landing').classList.add('hidden');
    document.body.style.background='transparent';
    $('hud').style.display='block';
    activeMode='laptop';
    startAmbientAudio();
}


/* ── EVAC ROUTE HELPERS ─────────────────────────────── */
function calcBearing(fx, fy, tx, ty) {
    // Grid: x=col, y=row; row increases downward → screen south
    const dx = tx - fx, dy = ty - fy;
    // Convert to geographic: north = -y, east = +x
    const rad = Math.atan2(dx, -dy);
    return ((rad * 180 / Math.PI) + 360) % 360;
}

function bearingToCardinal(deg) {
    const dirs = ['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(deg / 45) % 8];
}

function updateEvacArrow(route) {
    const compass = document.getElementById('evac-compass');
    if (!compass) return;
    if (!route || route.length < 2) {
        compass.classList.remove('visible');
        return;
    }
    compass.classList.add('visible');
    const bearing = calcBearing(
        route[0].x, route[0].y,
        route[Math.min(4, route.length - 1)].x,
        route[Math.min(4, route.length - 1)].y
    );
    const cardinal = bearingToCardinal(bearing);
    const totalDist = Math.round(route.length * (64 / grid.size));
    document.getElementById('evac-arrow-icon').style.transform = `rotate(${bearing}deg)`;
    document.getElementById('evac-dir-text').textContent  = cardinal;
    document.getElementById('evac-dist-text').textContent = `~${totalDist}m`;
}

function updateEvacRoute() {
    const state = grid.getState();
    // User position: center of grid
    const mid = Math.floor(grid.size / 2);
    const route = grid.calculateEvacRoute(mid, mid, 10);

    if (!route) {
        if (evacRoute !== null) {
            playAlarm();
        }
        evacRoute = null;
        updateEvacArrow(null);
        return;
    }

    const cardinal = bearingToCardinal(calcBearing(
        route[0].x, route[0].y,
        route[Math.min(4, route.length - 1)].x,
        route[Math.min(4, route.length - 1)].y
    ));

    const isNewRoute     = evacRoute === null;
    const majorReroute   = Math.abs(route.length - prevRoutePts) > 8;
    const dirChanged     = cardinal !== lastEvacDir;


    lastEvacDir  = cardinal;
    prevRoutePts = route.length;
    evacRoute    = route;
    updateEvacArrow(route);
}


/* ── XR probe — update landing buttons ─────────────── */
(async()=>{
    const hint=$('landing-hint');
    if(!navigator.xr){
        hint.textContent='WebXR unavailable — clicking VR enters fullscreen panorama mode';
        $('btn-ar').classList.add('hidden');
        return;
    }
    const [vrOk,arOk]=await Promise.all([
        navigator.xr.isSessionSupported('immersive-vr').catch(()=>false),
        navigator.xr.isSessionSupported('immersive-ar').catch(()=>false),
    ]);
    if(!arOk) $('btn-ar').classList.add('hidden');
    if(!vrOk) $('btn-vr').textContent='▶ LAPTOP MODE';
    if(!vrOk&&!arOk) hint.textContent='No XR headset detected — launching fullscreen panorama mode';
    else if(vrOk&&arOk) hint.textContent='VR + AR supported — select your mode';
    else if(vrOk)  hint.textContent='VR mode ready — AR passthrough not available on this device';
    else           hint.textContent='AR passthrough ready — VR mode unavailable';
})();
