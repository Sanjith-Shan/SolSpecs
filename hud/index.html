<!-- ═══════════════════════════════════════════════════════
     FIRE SIMULATION ENGINE (inlined)
════════════════════════════════════════════════════════ -->
<script>
'use strict';
function _mulberry32(seed){return function(){seed|=0;seed=(seed+0x6D2B79F5)|0;let t=Math.imul(seed^(seed>>>15),1|seed);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
class FireGrid{
    static FUEL_WATER=0;static FUEL_GRASS=1;static FUEL_BRUSH=2;static FUEL_FOREST=3;static FUEL_URBAN=4;static FUEL_ROCK=5;
    static BASE_RATES=[0,0.6,0.4,0.3,0.2,0];
    static BURN_DURATION=[Infinity,3,8,15,10,Infinity];
    constructor(size){this.size=size;this.cells=null;this._init=null;}
    generateTerrain(seed){
        const rng=_mulberry32(seed),N=this.size;
        this.cells=Array.from({length:N},(_,y)=>Array.from({length:N},(_,x)=>({fuel_type:3,elevation:0,state:0,burn_ticks:0})));
        for(let y=0;y<N;y++)for(let x=0;x<N;x++){const g=(x+(N-1-y))/(2*(N-1));this.cells[y][x].elevation=g*55+rng()*30;}
        for(let p=0;p<3;p++){const snap=this.cells.map(r=>r.map(c=>c.elevation));for(let y=0;y<N;y++)for(let x=0;x<N;x++){let s=0,c=0;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const ny=y+dy,nx=x+dx;if(ny>=0&&ny<N&&nx>=0&&nx<N){s+=snap[ny][nx];c++;}}this.cells[y][x].elevation=Math.round(s/c);}}
        const CX=Math.floor(N*0.44),CY=Math.floor(N*0.50);
        for(let y=0;y<N;y++)for(let x=0;x<N;x++){const dx=x-CX,dy=y-CY;if((dx*dx)/(10*10)+(dy*dy)/(8*8)<1)this.cells[y][x].fuel_type=1;}
        let rx=Math.floor(N*0.63);
        for(let y=0;y<N;y++){rx+=Math.floor(rng()*3)-1;rx=Math.max(Math.floor(N*0.50),Math.min(Math.floor(N*0.80),rx));for(let w=-1;w<=1;w++){const nx=rx+w;if(nx>=0&&nx<N){this.cells[y][nx].fuel_type=0;this.cells[y][nx].elevation=Math.max(0,this.cells[y][nx].elevation-20);}}}
        for(const[bx,by,r]of[[CX-15,CY-5,5],[CX+12,CY+9,6],[CX-8,CY+14,5],[CX+6,CY-14,5],[Math.floor(N*.1),Math.floor(N*.7),5],[Math.floor(N*.2),Math.floor(N*.85),6],[Math.floor(N*.7),Math.floor(N*.75),5]])
            for(let y=0;y<N;y++)for(let x=0;x<N;x++)if(this.cells[y][x].fuel_type===3&&Math.hypot(x-bx,y-by)<r)this.cells[y][x].fuel_type=2;
        this._init=this._clone(this.cells);this.clearingX=CX;this.clearingY=CY;
    }
    setFire(x,y){if(x<0||x>=this.size||y<0||y>=this.size)return;const c=this.cells[y][x];if(c.state===0&&FireGrid.BASE_RATES[c.fuel_type]!==0){c.state=1;c.burn_ticks=0;}}
    tick(wd,ws){this.cells=FireGrid._step(this.cells,this.size,wd,ws);}
    getState(){return this.cells;}
    predictFuture(mins,wd,ws){let c=this._clone(this.cells);for(let t=0;t<mins;t++)c=FireGrid._step(c,this.size,wd,ws);return c;}
    reset(){if(this._init)this.cells=this._clone(this._init);}
    _clone(c){return c.map(r=>r.map(x=>({...x})));}
    static _step(cells,size,wd,ws){
        const rad=wd*Math.PI/180,wxv=Math.sin(rad),wyv=-Math.cos(rad);
        const ss=Math.min(Math.max(ws/15,0),2.5);
        const next=cells.map(r=>r.map(c=>({...c})));
        for(let y=0;y<size;y++)for(let x=0;x<size;x++){
            const c=cells[y][x];if(c.state!==1)continue;
            next[y][x].burn_ticks=c.burn_ticks+1;
            if(next[y][x].burn_ticks>=FireGrid.BURN_DURATION[c.fuel_type])next[y][x].state=2;
            for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
                if(!dx&&!dy)continue;
                const nx=x+dx,ny=y+dy;if(nx<0||nx>=size||ny<0||ny>=size)continue;
                const nb=cells[ny][nx];if(nb.state!==0)continue;
                const br=FireGrid.BASE_RATES[nb.fuel_type];if(!br)continue;
                const mag=Math.sqrt(dx*dx+dy*dy),dot=(wxv*dx+wyv*dy)/mag;
                const rf=dot>0.5?2.0:dot>-0.5?1.0:0.3;
                const wf=1+(rf-1)*ss;
                const sf=Math.max(0.5,Math.min(3.0,1+0.5*(nb.elevation-c.elevation)/10));
                if(Math.random()<br*wf*sf){next[ny][nx].state=1;next[ny][nx].burn_ticks=0;}
            }
        }
        return next;
    }
}
</script>

<script>
'use strict';

/* ── CONFIG ─────────────────────────────────────────── */
const SENSOR_SERVER   = 'http://localhost:8080';
const PANORAMA_URL    = 'panorama.jpg';
const SENSOR_POLL_MS  = 2000;
const FIRE_TICK_MS    = 500;
const DEMO_WIND_DIR   = 45;
const DEMO_WIND_SPEED = 15;
const DEMO_SEED       = 42;
const GRID_SIZE       = 64;
const CELL_PX         = 5;

/* ── DEMO BOOT ──────────────────────────────────────── */
const grid = new FireGrid(GRID_SIZE);
grid.generateTerrain(DEMO_SEED);
grid.setFire(1,62); grid.setFire(2,61); grid.setFire(3,62);
for(let i=0;i<20;i++) grid.tick(DEMO_WIND_DIR, DEMO_WIND_SPEED);
const FIGHTER_X = grid.clearingX;
const FIGHTER_Y = grid.clearingY;

/* ── STATE ──────────────────────────────────────────── */
let simTick=20, lastTier=null, scrubActive=false, scrubTimer=null;
let proxAlertTick=-99, maydayFired=false;
const SCENE_START = Date.now();
let thermalOffset=0, airSec=1800, lastPollAt=0;
const alertQ=[]; let alertId=null;
let currentSensorData = null;   // latest sensor payload — read by VR panels
let currentAlertText  = '';     // current active alert (for VR panel)
let currentAlertLevel = '';
let activeMode = null;          // 'vr' | 'ar' | 'laptop'
let audioCtx   = null;
let ambientStarted = false;

/* ── SPEECH MANAGER ──────────────────────────────────── */
class SpeechManager {
    constructor() { this.speaking=false; this.queue=[]; }
    speak(text, priority='normal') {
        if(priority==='critical'){ window.speechSynthesis.cancel(); this.queue=[]; }
        if(this.speaking && priority!=='critical'){ this.queue.push(text); return; }
        this._speak(text);
    }
    _speak(text) {
        this.speaking=true;
        const u=new SpeechSynthesisUtterance(text);
        u.rate=1.1; u.pitch=0.9; u.volume=1.0;
        u.onend=()=>{ this.speaking=false; if(this.queue.length>0)this._speak(this.queue.shift()); };
        window.speechSynthesis.speak(u);
    }
}
const speechMgr = new SpeechManager();

/* ── AUDIO HELPERS ───────────────────────────────────── */
function _getAudioCtx() {
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    return audioCtx;
}

// Two-tone alarm: 800/600 Hz alternating, 200ms each, 3 reps
// Returns Promise that resolves when alarm finishes (~1.2s)
function playAlarm() {
    return new Promise(resolve=>{
        const ctx=_getAudioCtx();
        const tones=[800,600];
        let t=ctx.currentTime;
        for(let rep=0;rep<3;rep++) tones.forEach(freq=>{
            const osc=ctx.createOscillator(), g=ctx.createGain();
            osc.frequency.value=freq; osc.type='square';
            g.gain.setValueAtTime(0.28,t);
            g.gain.exponentialRampToValueAtTime(0.001,t+0.185);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(t); osc.stop(t+0.2); t+=0.2;
        });
        setTimeout(resolve, Math.round((t-ctx.currentTime)*1000)+50);
    });
}

// Layered filtered white noise: deep rumble + high crackle
function startAmbientAudio() {
    if(ambientStarted) return; ambientStarted=true;
    const ctx=_getAudioCtx();
    const bufLen=ctx.sampleRate*2;
    const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) data[i]=Math.random()*2-1;

    // Rumble layer
    const rumbleSrc=ctx.createBufferSource(); rumbleSrc.buffer=buf; rumbleSrc.loop=true;
    const rumbleFilt=ctx.createBiquadFilter(); rumbleFilt.type='lowpass'; rumbleFilt.frequency.value=180;
    const rumbleGain=ctx.createGain(); rumbleGain.gain.value=0.045;
    rumbleSrc.connect(rumbleFilt); rumbleFilt.connect(rumbleGain); rumbleGain.connect(ctx.destination);
    rumbleSrc.start();

    // Crackle layer
    const crackleSrc=ctx.createBufferSource(); crackleSrc.buffer=buf; crackleSrc.loop=true; crackleSrc.playbackRate.value=1.4;
    const crackleFilt=ctx.createBiquadFilter(); crackleFilt.type='bandpass'; crackleFilt.frequency.value=1600; crackleFilt.Q.value=0.6;
    const crackleGain=ctx.createGain(); crackleGain.gain.value=0.018;
    crackleSrc.connect(crackleFilt); crackleFilt.connect(crackleGain); crackleGain.connect(ctx.destination);
    crackleSrc.start();
}

/* ── ALERT QUEUE ─────────────────────────────────────── */
function showAlert(text, level='warning') { alertQ.push({text,level}); if(!alertId) _drainAlerts(); }

function _drainAlerts() {
    if(alertQ.length===0){ alertId=null; currentAlertText=''; currentAlertLevel=''; return; }
    const {text,level}=alertQ.shift();
    currentAlertText=text; currentAlertLevel=level;
    const b=$('alert-banner');
    const labels={critical:'⚠  CRITICAL',warning:'⚠  WARNING',info:'◈  INFO'};
    b.className='';
    $('alert-level').textContent=labels[level]??'⚠';

/* ── FIRE PROXIMITY ──────────────────────────────────── */
function checkProximity(cells) {
    let minDist=Infinity;
    for(let y=0;y<GRID_SIZE;y++) for(let x=0;x<GRID_SIZE;x++) if(cells[y][x].state===1){ const d=Math.hypot(x-FIGHTER_X,y-FIGHTER_Y); if(d<minDist)minDist=d; }
    if(minDist>20) return;
    if(simTick-proxAlertTick<24) return;
    if(minDist<=1){
        proxAlertTick=simTick;
        showAlert('FIRE AT YOUR POSITION — EVACUATE IMMEDIATELY','critical');
        playAlarm().then(()=>speechMgr.speak('Fire at your position. Evacuate immediately.','critical'));
    } else if(minDist<=3){
        proxAlertTick=simTick;
        const e=Math.max(1,Math.round(minDist/0.6));
        showAlert(`FIRE APPROACHING YOUR POSITION — EST. ${e} MIN`,'critical');
        playAlarm().then(()=>speechMgr.speak('Fire approaching your position. Begin egress immediately.','critical'));
    }
}

/* ── FIRE CANVAS RENDER (DOM + source for VR texture) ── */
const fcanvas=$('fire-canvas'), fctx=fcanvas.getContext('2d');
const FUEL_RGB=[[26,68,136],[200,180,86],[74,110,42],[29,77,26],[119,119,119],[153,153,153]];

function renderFire(cells) {
    const W=GRID_SIZE*CELL_PX, img=fctx.createImageData(W,W), d=img.data;
    for(let cy=0;cy<GRID_SIZE;cy++) for(let cx=0;cx<GRID_SIZE;cx++){
        const cell=cells[cy][cx]; let r,g,b;
        if(cell.state===1){r=255;g=80;b=0;}
        else if(cell.state===2){r=42;g=14;b=6;}
        else{const base=FUEL_RGB[cell.fuel_type]??FUEL_RGB[5];const ef=Math.max(0.55,Math.min(1.10,0.60+0.50*(cell.elevation/85)));r=Math.min(255,Math.round(base[0]*ef));g=Math.min(255,Math.round(base[1]*ef));b=Math.min(255,Math.round(base[2]*ef));}
        for(let py=0;py<CELL_PX;py++){const rb=((cy*CELL_PX+py)*W+cx*CELL_PX)*4;for(let px=0;px<CELL_PX;px++){const i=rb+px*4;d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=255;}}
    }
    fctx.putImageData(img,0,0);
    const fx=FIGHTER_X*CELL_PX+CELL_PX/2, fy=FIGHTER_Y*CELL_PX+CELL_PX/2;
    fctx.beginPath(); fctx.arc(fx,fy,6,0,Math.PI*2); fctx.fillStyle='#0088ff'; fctx.fill();
    fctx.strokeStyle='#ffffff'; fctx.lineWidth=2; fctx.stroke();
    const rad=DEMO_WIND_DIR*Math.PI/180, vx=Math.sin(rad), vy=-Math.cos(rad);
    const W2=GRID_SIZE*CELL_PX, ox=W2-16, oy=16, len=16, tx=ox+vx*len, ty=oy+vy*len, ang=Math.atan2(vy,vx);
    fctx.save(); fctx.strokeStyle='#ffdd00'; fctx.fillStyle='#ffdd00'; fctx.lineWidth=2;
    fctx.beginPath(); fctx.moveTo(ox,oy); fctx.lineTo(tx,ty); fctx.stroke();
    fctx.beginPath(); fctx.moveTo(tx,ty); fctx.lineTo(tx-7*Math.cos(ang-0.4),ty-7*Math.sin(ang-0.4)); fctx.lineTo(tx-7*Math.cos(ang+0.4),ty-7*Math.sin(ang+0.4)); fctx.closePath(); fctx.fill();
    fctx.font='bold 8px Courier New'; fctx.fillStyle='#ffdd00'; fctx.textAlign='center'; fctx.fillText('WIND',ox,oy+11); fctx.textAlign='left'; fctx.restore();
}

/* Panorama sphere */
function buildPanorama() {
    const geo=new THREE.SphereGeometry(500,60,40);

function makeFallbackTex() {
    const c=document.createElement('canvas'); c.width=2048; c.height=1024;
    const ctx=c.getContext('2d');
    const g=ctx.createLinearGradient(0,0,0,1024);
    g.addColorStop(0,'#100400'); g.addColorStop(0.30,'#2d0e00'); g.addColorStop(0.52,'#581800');
    g.addColorStop(0.68,'#a03000'); g.addColorStop(0.80,'#c85000'); g.addColorStop(1.00,'#1a0800');
    ctx.fillStyle=g; ctx.fillRect(0,0,2048,1024);
    // orange glow pools
    [350,800,1300,1700,200].forEach((bx,i)=>{
        const by=660+Math.sin(i*1.4)*70;
        const rg=ctx.createRadialGradient(bx,by,0,bx,by,240);
        rg.addColorStop(0,'rgba(255,110,0,0.30)'); rg.addColorStop(1,'rgba(255,50,0,0)');
        ctx.fillStyle=rg; ctx.fillRect(0,0,2048,1024);
    });
    // silhouette treeline
    ctx.fillStyle='#0a0400';
    for(let x=0;x<2048;x+=3){
        const h=110+Math.sin(x*0.025)*35+Math.sin(x*0.075)*18;
        ctx.fillRect(x,1024-Math.round(h),3,Math.round(h));
    }
    return new THREE.CanvasTexture(c);
}

/* Particle sprites */
function makeFlametex() {
    const c=document.createElement('canvas'); c.width=c.height=64;
    const ctx=c.getContext('2d');
    const g=ctx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0,'rgba(255,220,80,1)'); g.addColorStop(0.25,'rgba(255,110,0,0.9)');
    g.addColorStop(0.65,'rgba(200,35,0,0.45)'); g.addColorStop(1,'rgba(180,15,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(c);
}

function makeSmokeTex() {
    const c=document.createElement('canvas'); c.width=c.height=64;
    const ctx=c.getContext('2d');
    const g=ctx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0,'rgba(88,88,88,0.46)'); g.addColorStop(0.6,'rgba(60,60,60,0.20)'); g.addColorStop(1,'rgba(40,40,40,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(c);
}

function buildParticles() {
    const ftex=makeFlametex(), stex=makeSmokeTex();
    // 300 flame sprites
    for(let i=0;i<300;i++){
        const s=new THREE.Sprite(new THREE.SpriteMaterial({map:ftex,transparent:true,depthWrite:false}));
        const angle=Math.random()*Math.PI*2, r=3+Math.random()*5;
        s.position.set(Math.cos(angle)*r, Math.random()*0.3, Math.sin(angle)*r);
        s.scale.setScalar(0.07+Math.random()*0.12);
        s.userData={type:'flame',vy:0.003+Math.random()*0.005,angle,r,maxY:2.5+Math.random()*1.2};
        scene3.add(s); particles.push(s);
    }
    // 100 smoke sprites
    for(let i=0;i<100;i++){
        const s=new THREE.Sprite(new THREE.SpriteMaterial({map:stex,transparent:true,depthWrite:false}));
        const angle=Math.random()*Math.PI*2, r=2+Math.random()*7;
        s.position.set(Math.cos(angle)*r, Math.random()*2+0.5, Math.sin(angle)*r);
        s.scale.setScalar(0.14+Math.random()*0.24);
        s.userData={type:'smoke',vy:0.001+Math.random()*0.002,angle,r,maxY:5+Math.random()*1.2};
        scene3.add(s); particles.push(s);
    }
}

function tickParticles() {
    particles.forEach(p=>{
        const u=p.userData; p.position.y+=u.vy;
        if(u.type==='flame'){
            p.material.opacity=0.3+Math.random()*0.6;
            p.position.x=Math.cos(u.angle)*u.r+(Math.random()-0.5)*0.06;
            p.position.z=Math.sin(u.angle)*u.r+(Math.random()-0.5)*0.06;
        } else {
            p.material.opacity=0.12+Math.random()*0.22;
        }
        if(p.position.y>u.maxY){ p.position.y=(u.type==='smoke'?0.4:0); }
    });
}

}

function drawAlertVR() {
    const c=vrAlertC, ctx=c.getContext('2d'), W=c.width, H=c.height;
    if(!currentAlertText){ ctx.clearRect(0,0,W,H); vrAlertTex.needsUpdate=true; return; }
    const bc=currentAlertLevel==='critical'?'rgba(255,40,40,0.90)':currentAlertLevel==='warning'?'rgba(255,200,0,0.80)':'rgba(0,180,255,0.70)';
    _panelBg(ctx,W,H,bc);
    ctx.textAlign='center';
    const lc=currentAlertLevel==='critical'?'#ff4444':currentAlertLevel==='warning'?'#ffd700':'#44aaff';
    ctx.font='11px "Courier New"'; ctx.fillStyle=lc; ctx.fillText(currentAlertLevel.toUpperCase(),W/2,26);
    ctx.font='13px "Courier New"'; ctx.fillStyle='#ffffff'; ctx.fillText(currentAlertText,W/2,58);
    ctx.textAlign='left';
    vrAlertTex.needsUpdate=true;
}

/* Three.js animation loop (VR + laptop) */
function threeAnimate() {
    tickParticles();
    if(vrHudGroup){ drawVitalsVR(); drawTimersVR(); drawAlertVR(); vrFireTex.needsUpdate=true; }
    // Pulse fuel markers
    const _pt=Date.now()/1000;
    fuelMarkers.forEach(g=>g.children.forEach(s=>{
        if(s.userData.pulse) s.material.opacity=0.45+0.55*Math.abs(Math.sin(_pt*2.5+g.position.x+g.position.z));
    }));
    renderer3.render(scene3,camera3);
}


/* ═══════════════════════════════════════════════════════
   FUEL CLASSIFICATION — PHASE 7
════════════════════════════════════════════════════════ */
let fuelMarkers = [];
let isScanning  = false;
let fuelData    = [];

const FUEL_TIER_COL = {
    critical: {hex:'#ff2200', rgb:'255,34,0'},
    high:     {hex:'#ff8c00', rgb:'255,140,0'},
    moderate: {hex:'#ffdd00', rgb:'255,221,0'},
    low:      {hex:'#44cc44', rgb:'68,204,68'},
};
const _fuelTier = p => p<=2?'critical':p<=4?'high':p<=6?'moderate':'low';

function setScanStatus(msg) {
    const el=$('scan-status'); if(el) el.textContent=msg?'· '+msg:'';
    const btn=$('scan-btn');
    if(!btn)return;
    if(msg){ btn.textContent=msg; btn.classList.add('scanning'); }
    else   { btn.textContent='⬡ SCAN FUEL'; btn.classList.remove('scanning'); }
}

function _mockFuelData() {
    return [
        {fuel_type:'dead_grass',         flammability:'EXTREME',  priority:1, box_2d:[420,310,580,490], position:'2m ahead',          action:'Scrape to mineral soil'},
        {fuel_type:'pine_needle_litter', flammability:'EXTREME',  priority:2, box_2d:[310,120,490,310], position:'3m, slightly left',  action:'Rake and remove'},
        {fuel_type:'dead_brush',         flammability:'HIGH',     priority:3, box_2d:[210,510,450,760], position:'4m, right',          action:'Cut and remove'},
        {fuel_type:'fallen_branches',    flammability:'HIGH',     priority:4, box_2d:[610,210,800,460], position:'5m ahead',           action:'Cut and remove'},
        {fuel_type:'chaparral',          flammability:'MODERATE', priority:5, box_2d:[110,610,360,900], position:'6m, far right',      action:'Cut at ground level'},
    ];
}

async function _dummyJpeg() {
    const c=document.createElement('canvas'); c.width=64; c.height=64;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#3d2200'; ctx.fillRect(0,0,64,64);
    ctx.fillStyle='#7a5c30';
    for(let i=0;i<20;i++) ctx.fillRect(Math.random()*58,Math.random()*58,3+Math.random()*5,2);
    return new Promise(res=>c.toBlob(b=>b.arrayBuffer().then(res),'image/jpeg',0.7));
}

function _makeGlowTex(priority) {
    const col=FUEL_TIER_COL[_fuelTier(priority)].rgb;
    const c=document.createElement('canvas'); c.width=c.height=128;
    const ctx=c.getContext('2d');
    const g=ctx.createRadialGradient(64,64,0,64,64,64);
    g.addColorStop(0,   `rgba(${col},1.0)`);
    g.addColorStop(0.30,`rgba(${col},0.70)`);
    g.addColorStop(0.65,`rgba(${col},0.18)`);
    g.addColorStop(1,   `rgba(${col},0)`);
    ctx.fillStyle=g; ctx.fillRect(0,0,128,128);
    return new THREE.CanvasTexture(c);
}

function _makeLabelTex(item) {
    const col=FUEL_TIER_COL[_fuelTier(item.priority)].hex;
    const c=document.createElement('canvas'); c.width=400; c.height=84;
    const ctx=c.getContext('2d');
    ctx.fillStyle='rgba(0,0,0,0.80)';
    ctx.beginPath(); ctx.roundRect(2,2,396,80,8); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(2,2,396,80,8); ctx.stroke();
    ctx.textAlign='center';
    ctx.font='bold 18px "Courier New"'; ctx.fillStyle='#ffffff';
    ctx.fillText(item.fuel_type.replace(/_/g,' ').toUpperCase(),200,26);
    ctx.font='13px "Courier New"'; ctx.fillStyle=col;
    ctx.fillText((item.position||'ahead')+' · '+(item.action||'').substring(0,28),200,52);
    ctx.font='11px "Courier New"'; ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.fillText('PRIORITY '+item.priority+' · '+item.flammability,200,74);
    ctx.textAlign='left';
    return new THREE.CanvasTexture(c);
}

function boxToWorldPosition(box, cam, distance=4.0) {
    const cx=((box[1]+box[3])/2/1000)*2-1;
    const cy=-(((box[0]+box[2])/2/1000)*2-1);
    const v=new THREE.Vector3(cx,cy,-1).unproject(cam);
    v.sub(cam.position).normalize();
    return cam.position.clone().add(v.multiplyScalar(distance));
}

function _createMarker(item, worldPos) {
    const group=new THREE.Group(); group.position.copy(worldPos);
    const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:_makeGlowTex(item.priority),transparent:true,depthWrite:false}));
    glow.scale.setScalar(0.46); glow.userData.pulse=true; group.add(glow);
    const label=new THREE.Sprite(new THREE.SpriteMaterial({map:_makeLabelTex(item),transparent:true,depthWrite:false}));
    label.scale.set(0.92,0.19,1); label.position.set(0,0.40,0); group.add(label);
    scene3.add(group); return group;
}

function _clearMarkers(cb) {
    const old=[...fuelMarkers]; fuelMarkers=[];
    if(!old.length){cb&&cb();return;}
    let op=1.0;
    const id=setInterval(()=>{
        op-=0.14;
        old.forEach(g=>g.children.forEach(s=>{if(s.material)s.material.opacity=Math.max(0,op);}));
        if(op<=0){old.forEach(g=>scene3.remove(g));clearInterval(id);cb&&cb();}
    },20);
}

function _fadeInMarkers(markers) {
    let op=0;
    const id=setInterval(()=>{
        op+=0.08;
        markers.forEach(g=>g.children.forEach(s=>{if(s.material)s.material.opacity=Math.min(1,op);}));
        if(op>=1)clearInterval(id);
    },20);
}

function _placeVRMarkers(data) {
    const fresh=data.map((item,i)=>{
        const angle=(i/data.length)*Math.PI*2+Math.random()*0.5;
        const r=3+Math.random()*4;
        const pos=new THREE.Vector3(
            camera3.position.x+Math.cos(angle)*r,
            camera3.position.y-1.35+Math.random()*0.3,
            camera3.position.z+Math.sin(angle)*r
        );
        const m=_createMarker(item,pos);
        m.children.forEach(s=>{if(s.material)s.material.opacity=0;});
        return m;
    });
    fuelMarkers=fresh; _fadeInMarkers(fresh);
}

function _showFuelPanel(data) {
    fuelData=data;
    const icons={critical:'🔴',high:'🟠',moderate:'🟡',low:'🟢'};
    $('fuel-list').innerHTML=data.slice(0,6).map((item,i)=>`
<div class="fuel-item">
  <span class="fuel-num">${i+1}</span>
  <span>${icons[_fuelTier(item.priority)]}</span>
  <div><span class="fuel-name">${item.fuel_type.replace(/_/g,' ')}</span>
  <div class="fuel-detail">${item.position||''} → ${item.action||''}</div></div>
</div>`).join('');
    $('fuel-panel').style.display='';
}

function _speakTopFuel(data) {
    if(!data||!data.length)return;
    const t=data[0];
    speechMgr.speak(`Priority target: ${t.fuel_type.replace(/_/g,' ')}, ${t.position||'ahead'}. ${t.action||'clear it'}.`);
}

async function scanFuel() {
    if(isScanning||!scene3)return;
    isScanning=true; setScanStatus('SCANNING...');

    if(activeMode==='vr'){
        _clearMarkers(()=>{
            const data=_mockFuelData();
            _placeVRMarkers(data); _showFuelPanel(data); _speakTopFuel(data);
            setScanStatus(''); isScanning=false;
        });
        return;
    }

    try {
        const body=await _dummyJpeg();
        const res=await fetch(`${SENSOR_SERVER}/analyze-fuel`,{
            method:'POST',
            headers:{'Content-Type':'image/jpeg'},
            body,
            signal:AbortSignal.timeout(15000),
        });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const data=await res.json();

        _clearMarkers(()=>{
            if(!data.length){
                setScanStatus('NO FUELS DETECTED');
                setTimeout(()=>{setScanStatus('');isScanning=false;},3000);
                return;
            }
            const fresh=data.map(item=>{
                const pos=boxToWorldPosition(item.box_2d,camera3);
                const m=_createMarker(item,pos);
                m.children.forEach(s=>{if(s.material)s.material.opacity=0;});
                return m;
            });
            fuelMarkers=fresh; _fadeInMarkers(fresh);
            _showFuelPanel(data); _speakTopFuel(data);
            setScanStatus(''); isScanning=false;
        });
    } catch(e){
        console.warn('Fuel scan:',e.message);
        setScanStatus('SCAN FAILED');
        setTimeout(()=>{setScanStatus('');isScanning=false;},3000);
    }
}

/* ═══════════════════════════════════════════════════════
   MODE ENTRY
════════════════════════════════════════════════════════ */
async function enterVR() {
    if(!navigator.xr){ enterLaptop(); return; }
    const ok=await navigator.xr.isSessionSupported('immersive-vr').catch(()=>false);
    if(!ok){ enterLaptop(); return; }
    try {
        const session=await navigator.xr.requestSession('immersive-vr',{
            optionalFeatures:['local-floor','bounded-floor'],
        });
        if(!renderer3) initThreeScene();
        initVRHUD();
        renderer3.xr.setSession(session);
        renderer3.setAnimationLoop(threeAnimate);
        $('xr-canvas').classList.add('active');
        $('landing').classList.add('hidden');
        $('hud').style.display='none';
        activeMode='vr';
        startAmbientAudio();
        session.addEventListener('end',()=>{
            renderer3.setAnimationLoop(null);
            if(vrHudGroup){ camera3.remove(vrHudGroup); vrHudGroup=null; vrFireTex=null; }
            $('xr-canvas').classList.remove('active');
            $('landing').classList.remove('hidden');
            $('hud').style.display='none';
            activeMode=null;
        });
    } catch(e){ console.warn('VR failed:',e.message); enterLaptop(); }
}

async function enterAR() {
    if(!navigator.xr){ enterLaptop(); return; }
    const ok=await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
    if(!ok){ enterLaptop(); return; }
    try {
        const session=await navigator.xr.requestSession('immersive-ar',{
            requiredFeatures:['camera-access'],
            optionalFeatures:['dom-overlay'],
            domOverlay:{root:document.getElementById('hud')},
        });
        const glCanvas=document.createElement('canvas');
        document.body.appendChild(glCanvas);
        const gl=glCanvas.getContext('webgl',{xrCompatible:true});
        await gl.makeXRCompatible();
        session.updateRenderState({baseLayer:new XRWebGLLayer(session,gl)});
        document.body.style.background='transparent';
        $('landing').classList.add('hidden');
        $('hud').style.display='';
        activeMode='ar';
        (function xrFrame(){ session.requestAnimationFrame(xrFrame); })();
        session.addEventListener('end',()=>{
            glCanvas.remove(); document.body.style.background='';
            $('landing').classList.remove('hidden'); $('hud').style.display='none';
            activeMode=null;
        });
    } catch(e){ console.warn('AR failed:',e.message); enterLaptop(); }
}

function enterLaptop() {
    if(!renderer3) initThreeScene();
    // First-person panorama look-around via mouse drag
    let isDragging=false, prevX=0, prevY=0, yaw=0, pitch=0;
    const cvs=$('xr-canvas');
    cvs.addEventListener('mousedown',e=>{ isDragging=true; prevX=e.clientX; prevY=e.clientY; });
    cvs.addEventListener('mousemove',e=>{
        if(!isDragging)return;
        yaw  -=(e.clientX-prevX)*0.25; pitch-=(e.clientY-prevY)*0.25;
        pitch=Math.max(-80,Math.min(80,pitch));
        camera3.rotation.set(pitch*Math.PI/180,yaw*Math.PI/180,0,'YXZ');
        prevX=e.clientX; prevY=e.clientY;
    });
    cvs.addEventListener('mouseup',  ()=>isDragging=false);
    cvs.addEventListener('mouseleave',()=>isDragging=false);
    // Touch support
    cvs.addEventListener('touchstart',e=>{ isDragging=true; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; },{passive:true});
    cvs.addEventListener('touchmove', e=>{ if(!isDragging)return; const t=e.touches[0]; yaw-=(t.clientX-prevX)*0.25; pitch-=(t.clientY-prevY)*0.25; pitch=Math.max(-80,Math.min(80,pitch)); camera3.rotation.set(pitch*Math.PI/180,yaw*Math.PI/180,0,'YXZ'); prevX=t.clientX; prevY=t.clientY; },{passive:true});
    cvs.addEventListener('touchend',  ()=>isDragging=false);

    renderer3.setAnimationLoop(()=>{ tickParticles(); renderer3.render(scene3,camera3); });
    $('xr-canvas').classList.add('active');
    $('landing').classList.add('hidden');
    document.body.style.background='transparent';
    $('hud').style.display='';
    activeMode='laptop';
    startAmbientAudio();
}


/* ── XR probe — update landing buttons ─────────────── */
(async()=>{
    const hint=$('landing-hint');
    if(!navigator.xr){
        hint.textContent='WebXR unavailable — clicking VR enters fullscreen panorama mode';
        $('btn-ar').classList.add('hidden');
        return;
    }
    const [vrOk,arOk]=await Promise.all([
        navigator.xr.isSessionSupported('immersive-vr').catch(()=>false),
        navigator.xr.isSessionSupported('immersive-ar').catch(()=>false),
    ]);
    if(!arOk) $('btn-ar').classList.add('hidden');
    if(!vrOk) $('btn-vr').textContent='▶ LAPTOP MODE';
    if(!vrOk&&!arOk) hint.textContent='No XR headset detected — launching fullscreen panorama mode';
    else if(vrOk&&arOk) hint.textContent='VR + AR supported — select your mode';
    else if(vrOk)  hint.textContent='VR mode ready — AR passthrough not available on this device';
    else           hint.textContent='AR passthrough ready — VR mode unavailable';
})();


/* ── BOOT ────────────────────────────────────────────── */
setNoSignal(true);
renderFire(grid.getState());
updateTimers();
checkProximity(grid.getState());
pollSensors();
setInterval(pollSensors,  SENSOR_POLL_MS);
setInterval(fireTick,     FIRE_TICK_MS);
setInterval(updateTimers, 1000);

// Keyboard shortcut: F = scan fuel
document.addEventListener('keydown', e=>{
    if((e.key==='f'||e.key==='F')&&!e.ctrlKey&&!e.metaKey) scanFuel();
});

// 5-minute status update in yellow/orange tier
setInterval(()=>{
    const d=currentSensorData;
    if(!d) return;
    if(d.heat_tier==='yellow'||d.heat_tier==='orange'){
        speechMgr.speak(
            `Status update. Heart rate ${d.heart_rate}. Heat stress level ${d.heat_tier}.`
        );
    }
}, 5*60*1000);
</script>
